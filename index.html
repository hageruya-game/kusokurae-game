<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>圧力回廊</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <!-- デバッグラベル（テストモード用） -->
  <div class="debug-label" id="debug-label"></div>

  <!-- タイトル画面 -->
  <div id="screen-title" class="screen active">
    <!-- 非表示（DOM残す） -->
    <div class="title-top" style="display:none">
      <div class="title-label">⚠ 警告 ⚠</div>
      <div class="title-sub">このゲームは<br>空気を読みません</div>
    </div>
    <div class="title-character" style="display:none">
      <img src="image_0.png" alt="同調圧力の化身" class="character-img pulse">
    </div>
    <div class="comment-bubble" id="title-comment" style="display:none"></div>

    <!-- 導入文 -->
    <div class="title-intro">この世界では、<br>空気を読まない者が間違いにされる。</div>

    <!-- タイトル -->
    <h1 class="title-main">圧力回廊</h1>

    <!-- ボタン -->
    <button id="btn-start" class="btn btn-start">はじめる</button>
    <button id="btn-judge" class="btn btn-judge" style="display:none">連続ジャッジルーム</button>
    <!-- 隔離中: <button id="btn-corridor" class="btn btn-sub">圧力回廊（試作中）</button> -->
    <button id="btn-tutorial" class="btn btn-rule-style">ルール説明</button>

    <!-- 非表示（DOM残す） -->
    <div class="title-footer" style="display:none">※ 言うことを聞いたら負けです<br>※ ……たぶん</div>
  </div>

  <!-- ゲーム画面（3段レイアウト: 上段/中央キャラ段/下段） -->
  <div id="screen-game" class="screen">
    <!-- 上段: 情報 + 命令 -->
    <div class="game-zone-top">
      <div class="game-header">
        <div class="score-display">SCORE: <span id="score-num">0</span></div>
      </div>
      <div class="progress-row">
        <div class="progress-label">進行 <span id="round-num">1</span>/<span id="total-rounds">10</span></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="pressure-meter" id="pressure-meter">
        <div class="pressure-row">
          <div class="pressure-meter-label">支配度</div>
          <div class="pressure-bar">
            <div class="pressure-fill" id="pressure-fill"></div>
          </div>
          <div class="pressure-pct" id="pressure-pct">20%</div>
        </div>
        <div class="pressure-hint">※100%でゲームオーバー</div>
        <div class="state-line" id="state-line"></div>
      </div>
      <div class="game-command-area">
        <div id="command-text" class="command-text"></div>
      </div>
    </div>
    <!-- 中央キャラ段: 吹き出し(左) + キャラ(右) -->
    <div class="game-zone-center">
      <div class="game-speech" id="game-speech"></div>
      <div class="game-character">
        <img src="image_0.png" alt="同調圧力の化身" id="game-char-img" class="character-img">
        <div class="tap-guide" id="tap-guide">
          <img src="fake_guide_rat.png" class="tap-guide-img">
        </div>
      </div>
    </div>
    <!-- 下段: フィードバック + 操作 -->
    <div class="game-zone-bottom">
      <div id="feedback" class="feedback"></div>
      <div class="timer-bar timer-hidden" id="timer-bar">
        <div class="timer-fill" id="timer-fill"></div>
      </div>
      <div class="hint-message" id="hint-message"></div>
      <div class="game-choices choices-hidden" id="choices-area">
        <button id="btn-choice-0" class="btn btn-choice"></button>
        <button id="btn-choice-1" class="btn btn-choice"></button>
      </div>
    </div>
  </div>

  <!-- ○×フィードバックオーバーレイ -->
  <div id="ox-overlay" class="ox-overlay">
    <div id="ox-symbol" class="ox-symbol"></div>
  </div>

  <!-- 強煽りオーバーレイ -->
  <div id="taunt-overlay" class="taunt-overlay">
    <div id="taunt-text" class="taunt-text"></div>
  </div>

  <!-- フェーズ変更オーバーレイ -->
  <div id="phase-change-overlay" class="phase-overlay">
    <img src="image_0.png" alt="同調圧力の化身" class="character-img phase-char">
    <div class="phase-message" id="phase-message"></div>
  </div>

  <!-- チュートリアルテキストオーバーレイ -->
  <div id="tutorial-overlay" class="tutorial-overlay">
    <div id="tutorial-text" class="tutorial-text"></div>
    <div class="tutorial-tap-hint">タップで次へ</div>
  </div>
  <button id="tutorial-skip-btn" class="tutorial-skip-btn" style="display:none">スキップ ▶</button>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen">
    <div class="result-title" id="result-title"></div>
    <div class="result-character">
      <img src="image_0.png" alt="同調圧力の化身" class="character-img" id="result-char-img">
    </div>
    <div class="comment-bubble" id="result-comment"></div>
    <div class="result-score">
      <span id="result-score-num">0</span> / <span id="result-total-rounds">10</span>
    </div>
    <div class="result-pressure" id="result-pressure"></div>
    <div class="result-message" id="result-message"></div>
    <button id="btn-replay" class="btn btn-start">もう一回やる</button>
    <div class="result-footer" id="result-footer"></div>
  </div>

  <!-- 連続ジャッジルーム画面 -->
  <div id="screen-judge" class="screen">
    <!-- 上段: ヘッダー + 命令文 -->
    <div class="jr-zone-top">
      <div class="jr-header">
        <button id="jr-back" class="jr-back">← 戻る</button>
        <div class="jr-progress">Q<span id="jr-qnum">1</span> / <span id="jr-qtotal">12</span></div>
        <div class="jr-miss">MISS: <span id="jr-miss-num">0</span></div>
      </div>
      <div class="jr-type-label" id="jr-type-label"></div>
      <div class="jr-command-area">
        <div id="jr-command" class="jr-command"></div>
      </div>
    </div>
    <!-- 中央: キャラ + 吹き出し -->
    <div class="jr-zone-center">
      <div class="jr-speech" id="jr-speech"></div>
      <div class="jr-character">
        <img src="image_0.png" alt="同調圧力の化身" class="character-img" id="jr-char-img">
      </div>
    </div>
    <!-- 下段: フィードバック + タイマー + ボタン -->
    <div class="jr-zone-bottom">
      <div id="jr-feedback" class="jr-feedback"></div>
      <div class="jr-timer-bar" id="jr-timer-bar">
        <div class="jr-timer-fill" id="jr-timer-fill"></div>
      </div>
      <div class="jr-choices" id="jr-choices">
        <button id="jr-btn-left" class="btn jr-btn">← 左</button>
        <button id="jr-btn-right" class="btn jr-btn">右 →</button>
        <button id="jr-btn-wait" class="btn jr-btn jr-btn-wait">待つ</button>
      </div>
    </div>
    <!-- リザルトオーバーレイ -->
    <div class="jr-result-overlay" id="jr-result-overlay">
      <div class="jr-result-title" id="jr-result-title"></div>
      <div class="jr-result-score-wrap">
        <div class="jr-result-score-label">抗圧指数</div>
        <div class="jr-result-score"><span id="jr-result-score-num">0</span> <span class="jr-result-score-unit">/ 100</span></div>
      </div>
      <div class="jr-result-miss" id="jr-result-miss"></div>
      <div class="jr-result-message" id="jr-result-message"></div>
      <div class="jr-result-detail" id="jr-result-detail"></div>
      <button id="jr-btn-retry" class="btn btn-start">もう一回</button>
      <button id="jr-btn-title" class="btn btn-dungeon">タイトルへ</button>
    </div>
  </div>

  <!-- 逆指示ダンジョン画面 -->
  <div id="screen-dungeon" class="screen">
    <!-- 上段: ヘッダー + 命令 -->
    <div class="dg-zone-top">
      <div class="dg-header">
        <button id="dg-back" class="dg-back">← 戻る</button>
        <div class="dg-stage-label" id="dg-stage-label">STAGE 1</div>
        <div class="dg-miss" id="dg-miss">MISS: 0</div>
        <div class="dg-status-wrap" id="dg-status-wrap" data-stage="normal">
          <span class="dg-status-label">状態:</span>
          <span class="dg-status-name" id="dg-status-name">平常</span>
        </div>
      </div>
      <div class="dg-command" id="dg-command"></div>
      <div class="dg-comment" id="dg-comment"></div>
    </div>
    <!-- 中段: グリッド迷路 -->
    <div class="dg-zone-center">
      <div class="dg-grid" id="dg-grid"></div>
    </div>
    <!-- 下段: フィードバック + D-pad -->
    <div class="dg-zone-bottom">
      <div class="dg-feedback" id="dg-feedback"></div>
      <div class="dg-dpad" id="dg-dpad">
        <button class="dg-arrow dg-up" id="dg-up">▲</button>
        <div class="dg-dpad-row">
          <button class="dg-arrow dg-left" id="dg-left">◀</button>
          <div class="dg-dpad-center"></div>
          <button class="dg-arrow dg-right" id="dg-right">▶</button>
        </div>
        <button class="dg-arrow dg-down" id="dg-down">▼</button>
      </div>
    </div>
    <!-- チュートリアルオーバーレイ -->
    <div class="dg-tutorial-overlay" id="dg-tutorial-overlay">
      <div class="dg-tutorial-text">命令を信じるな。<br>すべてが罠だ。</div>
      <div class="dg-tutorial-hint">タップして開始</div>
    </div>
    <!-- クリア/ゲームオーバー オーバーレイ -->
    <div class="dg-result-overlay" id="dg-result-overlay">
      <div class="dg-result-title" id="dg-result-title"></div>
      <div class="dg-result-msg" id="dg-result-msg"></div>
      <div class="dg-result-rank" id="dg-result-rank"></div>
      <button id="dg-btn-next" class="btn btn-start dg-btn-next">次のステージ →</button>
      <button id="dg-btn-retry" class="btn btn-start">最初からやり直す</button>
      <button id="dg-btn-title" class="btn btn-dungeon">タイトルへ</button>
    </div>
  </div>

  <!-- 圧力回廊（ダンジョンv2 試作） -->
  <div id="screen-corridor" class="screen">
    <div class="cr-zone-top">
      <div class="cr-header">
        <button id="cr-back" class="cr-back">← 戻る</button>
        <div class="cr-stage-label">圧力回廊</div>
        <div class="cr-miss" id="cr-miss">MISS: 0</div>
      </div>
      <div class="cr-type-label" id="cr-type-label"></div>
      <div class="cr-command" id="cr-command"></div>
    </div>
    <div class="cr-zone-center">
      <div class="cr-grid" id="cr-grid"></div>
      <div class="cr-lure-area" id="cr-lure-area"></div>
    </div>
    <div class="cr-zone-bottom">
      <div class="cr-feedback" id="cr-feedback"></div>
      <div class="cr-timer-bar" id="cr-timer-bar">
        <div class="cr-timer-fill" id="cr-timer-fill"></div>
      </div>
      <div class="cr-dpad" id="cr-dpad">
        <button class="cr-arrow cr-up" id="cr-up">▲</button>
        <div class="cr-dpad-row">
          <button class="cr-arrow cr-left" id="cr-left">◀</button>
          <div class="cr-dpad-center"></div>
          <button class="cr-arrow cr-right" id="cr-right">▶</button>
        </div>
        <button class="cr-arrow cr-down" id="cr-down">▼</button>
      </div>
    </div>
    <!-- チュートリアルオーバーレイ -->
    <div class="cr-tutorial-overlay" id="cr-tutorial-overlay">
      <div class="cr-tutorial-text">分岐では命令に惑わされるな。<br>ルールはジャッジルームと同じだ。</div>
      <div class="cr-tutorial-hint">タップして開始</div>
    </div>
    <!-- リザルトオーバーレイ -->
    <div class="cr-result-overlay" id="cr-result-overlay">
      <div class="cr-result-title" id="cr-result-title"></div>
      <div class="cr-result-score" id="cr-result-score"></div>
      <div class="cr-result-msg" id="cr-result-msg"></div>
      <button id="cr-btn-retry" class="btn btn-start">もう一回</button>
      <button id="cr-btn-title" class="btn btn-dungeon">タイトルへ</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
