<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>同調圧力くそくらえ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- デバッグラベル（テストモード用） -->
  <div class="debug-label" id="debug-label"></div>

  <!-- タイトル画面 -->
  <div id="screen-title" class="screen active">
    <div class="title-top">
      <div class="title-label">⚠ 警告 ⚠</div>
      <div class="title-sub">このゲームは<br>空気を読みません</div>
    </div>
    <div class="title-character">
      <img src="image_0.png" alt="同調圧力の化身" class="character-img pulse">
    </div>
    <div class="comment-bubble" id="title-comment"></div>
    <h1 class="title-main">同調圧力<br><span class="title-accent">くそくらえ</span></h1>
    <button id="btn-start" class="btn btn-start">ゲームスタート</button>
    <button id="btn-dungeon" class="btn btn-dungeon">逆指示ダンジョン（試作）</button>
    <div class="title-footer">※ 言うことを聞いたら負けです<br>※ ……たぶん</div>
  </div>

  <!-- ゲーム画面（3段レイアウト: 上段/中央キャラ段/下段） -->
  <div id="screen-game" class="screen">
    <!-- 上段: 情報 + 命令 -->
    <div class="game-zone-top">
      <div class="game-header">
        <div class="score-display">SCORE: <span id="score-num">0</span></div>
      </div>
      <div class="progress-row">
        <div class="progress-label">進行 <span id="round-num">1</span>/<span id="total-rounds">10</span></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="pressure-meter" id="pressure-meter">
        <div class="pressure-row">
          <div class="pressure-meter-label">支配度</div>
          <div class="pressure-bar">
            <div class="pressure-fill" id="pressure-fill"></div>
          </div>
          <div class="pressure-pct" id="pressure-pct">20%</div>
        </div>
        <div class="pressure-hint">※100%でゲームオーバー</div>
        <div class="state-line" id="state-line"></div>
      </div>
      <div class="game-command-area">
        <div id="command-text" class="command-text"></div>
      </div>
    </div>
    <!-- 中央キャラ段: 吹き出し(左) + キャラ(右) -->
    <div class="game-zone-center">
      <div class="game-speech" id="game-speech"></div>
      <div class="game-character">
        <img src="image_0.png" alt="同調圧力の化身" id="game-char-img" class="character-img">
        <div class="tap-guide" id="tap-guide">
          <img src="fake_guide_rat.png" class="tap-guide-img">
        </div>
      </div>
    </div>
    <!-- 下段: フィードバック + 操作 -->
    <div class="game-zone-bottom">
      <div id="feedback" class="feedback"></div>
      <div class="timer-bar timer-hidden" id="timer-bar">
        <div class="timer-fill" id="timer-fill"></div>
      </div>
      <div class="hint-message" id="hint-message"></div>
      <div class="game-choices choices-hidden" id="choices-area">
        <button id="btn-choice-0" class="btn btn-choice"></button>
        <button id="btn-choice-1" class="btn btn-choice"></button>
      </div>
    </div>
  </div>

  <!-- ○×フィードバックオーバーレイ -->
  <div id="ox-overlay" class="ox-overlay">
    <div id="ox-symbol" class="ox-symbol"></div>
  </div>

  <!-- 強煽りオーバーレイ -->
  <div id="taunt-overlay" class="taunt-overlay">
    <div id="taunt-text" class="taunt-text"></div>
  </div>

  <!-- フェーズ変更オーバーレイ -->
  <div id="phase-change-overlay" class="phase-overlay">
    <img src="image_0.png" alt="同調圧力の化身" class="character-img phase-char">
    <div class="phase-message" id="phase-message"></div>
  </div>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen">
    <div class="result-title" id="result-title"></div>
    <div class="result-character">
      <img src="image_0.png" alt="同調圧力の化身" class="character-img" id="result-char-img">
    </div>
    <div class="comment-bubble" id="result-comment"></div>
    <div class="result-score">
      <span id="result-score-num">0</span> / <span id="result-total-rounds">10</span>
    </div>
    <div class="result-pressure" id="result-pressure"></div>
    <div class="result-message" id="result-message"></div>
    <button id="btn-replay" class="btn btn-start">もう一回やる</button>
    <div class="result-footer" id="result-footer"></div>
  </div>

  <!-- 逆指示ダンジョン画面 -->
  <div id="screen-dungeon" class="screen">
    <!-- 上段: ヘッダー + 命令 -->
    <div class="dg-zone-top">
      <div class="dg-header">
        <button id="dg-back" class="dg-back">← 戻る</button>
        <div class="dg-stage-label" id="dg-stage-label">STAGE 1</div>
        <div class="dg-miss" id="dg-miss">MISS: 0</div>
        <div class="dg-status-wrap" id="dg-status-wrap" data-stage="normal">
          <span class="dg-status-label">状態:</span>
          <span class="dg-status-name" id="dg-status-name">平常</span>
        </div>
      </div>
      <div class="dg-command" id="dg-command"></div>
      <div class="dg-comment" id="dg-comment"></div>
    </div>
    <!-- 中段: グリッド迷路 -->
    <div class="dg-zone-center">
      <div class="dg-grid" id="dg-grid"></div>
    </div>
    <!-- 下段: フィードバック + D-pad -->
    <div class="dg-zone-bottom">
      <div class="dg-feedback" id="dg-feedback"></div>
      <div class="dg-dpad" id="dg-dpad">
        <button class="dg-arrow dg-up" id="dg-up">▲</button>
        <div class="dg-dpad-row">
          <button class="dg-arrow dg-left" id="dg-left">◀</button>
          <div class="dg-dpad-center"></div>
          <button class="dg-arrow dg-right" id="dg-right">▶</button>
        </div>
        <button class="dg-arrow dg-down" id="dg-down">▼</button>
      </div>
    </div>
    <!-- チュートリアルオーバーレイ -->
    <div class="dg-tutorial-overlay" id="dg-tutorial-overlay">
      <div class="dg-tutorial-text">命令を信じるな。<br>すべてが罠だ。</div>
      <div class="dg-tutorial-hint">タップして開始</div>
    </div>
    <!-- クリア/ゲームオーバー オーバーレイ -->
    <div class="dg-result-overlay" id="dg-result-overlay">
      <div class="dg-result-title" id="dg-result-title"></div>
      <div class="dg-result-msg" id="dg-result-msg"></div>
      <div class="dg-result-rank" id="dg-result-rank"></div>
      <button id="dg-btn-next" class="btn btn-start dg-btn-next">次のステージ →</button>
      <button id="dg-btn-retry" class="btn btn-start">最初からやり直す</button>
      <button id="dg-btn-title" class="btn btn-dungeon">タイトルへ</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
